version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${USUARIO}
      POSTGRES_PASSWORD: ${SENHA}
      POSTGRES_DB: ${NOME_BANCO}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # 2. Back-end Express + Prisma
  backend:
    build: ./node # Caminho para a pasta do Express
    container_name: express_backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://${USUARIO}:${SENHA}@db:5432/${NOME_BANCO}?schema=public
      - DB_HOST=db
    depends_on:
      - db
    volumes:
      - ./node:/app
      - /app/node_modules
    networks:
      - app-network

  # 3. Front-end React
  frontend:
    build: ./react # Caminho para a pasta do React
    container_name: react_frontend
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./react:/app
      - /app/node_modules
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge